<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نديرة | مولد الصور بالذكاء الاصطناعي</title>
    <meta
      name="description"
      content="نديرة - منصة عربية كاملة لتوليد الصور بالذكاء الاصطناعي باتجاه من اليمين إلى اليسار."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="sidebarOverlay" class="sds-sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="sds-sidebar" aria-label="القائمة الجانبية">
      <div class="sds-sidebar__header">
        <div class="logo-container">
          <img class="sds-logo-mark" src="/assets/logo-mark.svg" alt="شعار نديرة" />
          <span class="brand-name">نديرة</span>
        </div>
        <button class="sds-btn sds-btn--icon sds-btn--ghost" onclick="toggleSidebar()" aria-label="إغلاق القائمة">
          <img class="sds-btn__icon" src="/assets/icons/close.svg" alt="" aria-hidden="true" />
        </button>
      </div>

      <nav class="sds-sidebar__body" aria-label="روابط المنصة">
        <a href="#" class="sds-sidebar__nav-item is-active"><img class="sds-sidebar__nav-icon" src="/assets/icons/home.svg" alt="" aria-hidden="true" />الرئيسية</a>
        <a href="#" class="sds-sidebar__nav-item"><img class="sds-sidebar__nav-icon" src="/assets/icons/image-gen.svg" alt="" aria-hidden="true" />إنشاء الصور</a>
        <a href="#" class="sds-sidebar__nav-item"><img class="sds-sidebar__nav-icon" src="/assets/icons/audio-gen.svg" alt="" aria-hidden="true" />إنشاء الصوت</a>
        <a href="#" class="sds-sidebar__nav-item"><img class="sds-sidebar__nav-icon" src="/assets/icons/graphic-gen.svg" alt="" aria-hidden="true" />إنشاء الرسومات</a>
        <a href="#" class="sds-sidebar__nav-item"><img class="sds-sidebar__nav-icon" src="/assets/icons/chat.svg" alt="" aria-hidden="true" />المحادثة</a>
        <a href="#" class="sds-sidebar__nav-item"><img class="sds-sidebar__nav-icon" src="/assets/icons/settings.svg" alt="" aria-hidden="true" />الإعدادات</a>
      </nav>
    </aside>

    <header class="header">
      <div class="header-content">
        <div class="logo-container">
          <img class="sds-logo" src="/assets/logo.svg" alt="شعار نديرة الكامل" />
          <span class="brand-name">نديرة</span>
        </div>
        <button class="sds-btn sds-btn--icon sds-btn--ghost menu-btn" onclick="toggleSidebar()" aria-label="فتح القائمة">
          <img class="sds-btn__icon" src="/assets/icons/menu.svg" alt="" aria-hidden="true" />
        </button>
      </div>
    </header>

    <main class="container">
      <section class="hero sds-fade-up">
        <img class="hero-logo sds-logo-pulse" src="/assets/logo-mark.svg" alt="شعار نديرة" />
        <h1>
          نديرة - <span class="hero-gradient-text">سحر الإبداع بالذكاء الاصطناعي</span>
        </h1>
        <p class="typing-text">حوّل أفكارك إلى صور فنية مذهلة بضغطة زر واحدة</p>
      </section>

      <section class="generator-section sds-fade-up">
        <h2 class="section-title">
          <span class="sds-icon-glass">
            <img src="/assets/icons/image-gen.svg" alt="" aria-hidden="true" />
          </span>
          صف الصورة التي تتخيلها
        </h2>

        <div class="prompt-container">
          <div class="prompt-wrapper">
            <textarea
              id="promptInput"
              class="sds-textarea"
              placeholder="اكتب وصفًا دقيقًا للصورة التي تريد إنشاءها..."
              maxlength="500"
            ></textarea>
            <span id="charCount" class="char-count">0 / 500</span>
          </div>
          <button id="enhanceBtn" class="sds-btn sds-btn--gradient sds-btn--lg" onclick="enhancePrompt()">
            <img class="sds-btn__icon" src="/assets/icons/generate.svg" alt="" aria-hidden="true" />
            تحسين تلقائي
          </button>
        </div>

        <div class="style-section sds-fade-up">
          <h3 class="subsection-title">اختر الأسلوب الفني</h3>
          <div class="style-grid sds-stagger" id="styleGrid">
            <div class="style-card active style-realistic" data-style="واقعي" onclick="selectStyle(this)"></div>
            <div class="style-card style-cartoon" data-style="رسوم متحركة" onclick="selectStyle(this)"></div>
            <div class="style-card style-oil" data-style="زيتي" onclick="selectStyle(this)"></div>
            <div class="style-card style-3d" data-style="ثلاثي الأبعاد" onclick="selectStyle(this)"></div>
            <div class="style-card style-anime" data-style="أنمي" onclick="selectStyle(this)"></div>
            <div class="style-card style-cyberpunk" data-style="سايبربانك" onclick="selectStyle(this)"></div>
          </div>
        </div>

        <div class="advanced-options-toggle" onclick="toggleAdvancedOptions()">
          إعدادات متقدمة
        </div>

        <div id="advancedOptions" class="advanced-options">
          <div class="option-group">
            <label class="sds-label" for="aspectRatio">نسبة الأبعاد</label>
            <select id="aspectRatio" class="sds-select">
              <option value="1:1">مربع (1:1)</option>
              <option value="16:9">عريض (16:9)</option>
              <option value="9:16">عمودي (9:16)</option>
              <option value="4:3">قياسي (4:3)</option>
            </select>
          </div>

          <div class="option-group">
            <label class="sds-label" for="quality">الجودة</label>
            <select id="quality" class="sds-select">
              <option value="standard">قياسية</option>
              <option value="hd">عالية الدقة</option>
              <option value="ultra">فائقة الجودة</option>
            </select>
          </div>

          <div class="option-group">
            <label class="sds-label" for="creativity">قوة الإبداع: <span id="creativityValue" class="range-value">7</span></label>
            <input id="creativity" class="sds-range" type="range" min="1" max="15" value="7" />
          </div>

          <div class="option-group">
            <label class="sds-label" for="numImages">عدد الصور</label>
            <select id="numImages" class="sds-select">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="4">4</option>
            </select>
          </div>
        </div>

        <button id="generateBtn" class="sds-btn sds-btn--primary sds-btn--lg" onclick="generateImages()">
          <img class="sds-btn__icon" src="/assets/icons/generate.svg" alt="" aria-hidden="true" />
          إنشاء الصور
        </button>

        <div id="gallery" class="gallery" aria-live="polite"></div>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="assertive"></div>

    <script src="/app.js"></script>
  </body>
</html>
